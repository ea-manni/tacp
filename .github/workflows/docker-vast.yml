name: Build and Push Vast.ai Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.vast'
      - 'src/**'
      - 'package*.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.vast
          push: true
          tags: eolowo/tacp-vast:latest,eolowo/tacp-vast:v3